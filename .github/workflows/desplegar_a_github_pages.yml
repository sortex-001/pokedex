name: VITE MPA Despliegue de Portal a Github Pages

on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
env:
  DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.github-pages.output.url }}
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el Repositorio
        uses: actions/checkout@v4
      - name: Instalar Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Instalar las Dependencias del Proyecto
        run: npm ci
      - name: Compilar la página para distribución
        run: npx --yes vite build
      - name: Configura Github Pages
        uses: actions/configure-pages@v5
      - name: Subir los compilados (artefactos) a GP
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
      - name: Publicar Github Pages
        uses: actions/deploy-pages@v4